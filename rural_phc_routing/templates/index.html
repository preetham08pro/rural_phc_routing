<!DOCTYPE html>
<html>
<head>
    <title>AI Triage System</title>
</head>
<body>

    <h2>🏥 Rural PHC AI Triage</h2>

    <!-- ❌ Error Message -->
    {% if error %}
        <p style="color:red; font-weight:bold;">
            ⚠️ {{ error }}
        </p>
    {% endif %}

    <form action="/predict" method="POST">

        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Age:</label><br>
        <input type="number" name="age" min="0" max="120" required><br><br>

        <label>Temperature (°C):</label><br>
        <input type="number" step="0.1" name="temp" min="30" max="45" required><br><br>

        <label>Oxygen Level (%):</label><br>
        <input type="number" name="oxygen" min="50" max="100" required><br><br>

        <label>Blood Pressure:</label><br>
        <input type="number" name="bp" min="60" max="200" required><br><br>

        <button type="submit">Check Severity</button>

    </form>

</body>
</html>
